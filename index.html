<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QuickyJS</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root{
--bg:#f5f5f7;--panel:rgba(255,255,255,.82);--text:#111827;--border:rgba(0,0,0,.08);--accent:#0071e3;
}
body.dark{
--bg:#0f1115;--panel:rgba(26,28,34,.82);--text:#f3f4f6;--border:rgba(255,255,255,.08);--accent:#0a84ff;
}
*{box-sizing:border-box}
body{margin:0;height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.app{height:100%;padding:16px;display:flex;flex-direction:column;gap:12px}
.top{display:flex;justify-content:space-between}
button,select{padding:10px 14px;border-radius:12px;border:1px solid var(--border);cursor:pointer}
.grid{flex:1;display:grid;grid-template-columns:50% 8px calc(50% - 8px);min-height:0}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:12px;display:flex;flex-direction:column;min-height:0}
textarea{flex:1;width:100%;resize:none}
.drop{margin-top:8px;padding:14px;border:2px dashed var(--border);border-radius:12px;text-align:center;cursor:pointer}
.drop.dragging{border-color:var(--accent)}
iframe{flex:1;border-radius:12px}
.console{height:220px;overflow:auto;border:1px solid var(--border);padding:8px;font-family:monospace}
.log{color:green}.warn{color:orange}.error{color:red}.info{color:blue}
.pill{display:inline-block;padding:4px 8px;background:#9992;border-radius:999px;margin:4px;font-size:12px}
#divider{cursor:col-resize}
</style>
</head>
<body>
<div class="app">
<div class="top">
<div>QuickyJS<span id="status">Idle</span></div>
<div>
<select id="mode"><option>Auto</option><option>HTML</option><option>CSS</option><option>JS</option></select>
<button id="themeBtn">Theme</button>
<button id="runBtn">Run</button>
</div>
</div>

<div class="grid" id="grid">
<div class="panel">
<textarea id="editor"></textarea>
<div class="drop" id="drop">Drop files or click</div>
<input type="file" id="fileInput" hidden multiple accept=".html,.css,.js">
<div id="pills"></div>
</div>
<div id="divider"></div>
<div class="panel">
<iframe id="preview" sandbox="allow-scripts"></iframe>
<div class="console" id="console"></div>
</div>
</div>
</div>

<script>
const fileInput=document.getElementById('fileInput');
const drop=document.getElementById('drop');
const fileStore=new Map();

function setTheme(theme){
 document.body.classList.toggle('dark',theme==='dark');
 localStorage.setItem('qjs_theme',theme);
}
setTheme(localStorage.getItem('qjs_theme')||'light');

document.getElementById('themeBtn').onclick=()=>{
 setTheme(document.body.classList.contains('dark')?'light':'dark');
};

drop.onclick=()=>fileInput.click();

['dragenter','dragover','dragleave','drop'].forEach(ev=>{
 drop.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();});
});

drop.addEventListener('dragenter',()=>drop.classList.add('dragging'));
drop.addEventListener('dragleave',()=>drop.classList.remove('dragging'));
drop.addEventListener('drop',e=>{
 drop.classList.remove('dragging');
 loadFiles([...e.dataTransfer.files]);
});

fileInput.addEventListener('change',e=>loadFiles([...e.target.files]));

function loadFiles(files){
 files.forEach(file=>{
  const r=new FileReader();
  r.onload=()=>{
   fileStore.set(file.name,{name:file.name,content:r.result});
   renderPills();
  };
  r.readAsText(file);
 });
}

function renderPills(){
 const pills=document.getElementById('pills');
 pills.innerHTML='';
 fileStore.forEach(f=>{
  const d=document.createElement('span');
  d.className='pill';
  d.textContent=f.name;
  pills.appendChild(d);
 });
}

function serialize(v){
 try{return typeof v==='object'?JSON.stringify(v,null,2):String(v);}
 catch{return String(v);}
}

window.addEventListener('message',e=>{
 const d=e.data;
 if(!d||d.source!=='quickjs') return;
 if(d.type==='status'){document.getElementById('status').textContent=d.value;return;}
 const div=document.createElement('div');
 div.className=d.type;
 div.textContent='['+d.type.toUpperCase()+'] '+(d.args||[]).join(' ');
 document.getElementById('console').appendChild(div);
});

function build(){
 let html='',css='',js='';
 fileStore.forEach(f=>{
  if(f.name.endsWith('.html')) html+=f.content;
  if(f.name.endsWith('.css')) css+=f.content;
  if(f.name.endsWith('.js')) js+=f.content;
 });

 const txt=document.getElementById('editor').value.trim();
 const mode=document.getElementById('mode').value;

 if(mode==='HTML') html+=txt;
 else if(mode==='CSS') css+=txt;
 else if(mode==='JS') js+=txt;
 else{
   if(txt.startsWith('<')) html+=txt;
   else if(txt.includes('{')&&txt.includes('}')&&!txt.includes('function')) css+=txt;
   else js+=txt;
 }

 if(!html) html='<div style="padding:20px">QuickJS Preview</div>';

 const themeCss=document.body.classList.contains('dark')
 ? 'body{background:#0f1115;color:#f3f4f6}'
 : 'body{background:#fff;color:#111827}';

 return `<!doctype html><html><head><style>${themeCss}${css}</style></head><body>${html}
 <script>
 const send=(t,a)=>parent.postMessage({source:'quickjs',type:t,args:a},'*');
 function s(v){try{return typeof v==='object'?JSON.stringify(v):String(v)}catch{return String(v)}}
 ['log','warn','error','info'].forEach(k=>{
  const o=console[k];
  console[k]=(...a)=>{send(k,a.map(s));o.apply(console,a);};
 });
 window.onerror=(m)=>send('error',[m]);
 parent.postMessage({source:'quickjs',type:'status',value:'Running'},'*');
 <\/script>
 <script>${js}<\/script></body></html>`;
}

document.getElementById('runBtn').onclick=()=>{
 document.getElementById('console').innerHTML='';
 document.getElementById('preview').srcdoc=build();
};

document.addEventListener('keydown',e=>{
 if((e.ctrlKey||e.metaKey)&&e.key==='Enter') document.getElementById('runBtn').click();
});

const divider=document.getElementById('divider');
const grid=document.getElementById('grid');
let dragging=false;
divider.onmousedown=()=>dragging=true;
window.onmouseup=()=>dragging=false;
window.onmousemove=e=>{
 if(!dragging||innerWidth<900) return;
 const p=Math.max(20,Math.min(80,e.clientX/innerWidth*100));
 grid.style.gridTemplateColumns=`${p}% 8px ${100-p}%`;
};
</script>
</body>
</html>
